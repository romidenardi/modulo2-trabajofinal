<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCIRR | Reserva de salas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>
    
    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="../assets/ccirr-color.png" alt="CCIRR" width="50" height="50">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo02" aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="../index.html" >Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="calendario.html">Calendario</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="https://ccirr.org.ar/" target="_blank">Sitio web</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="https://ccirr.diamo.com.ar/#login" target="_blank">Diamo</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>  
    <main>
        <section>
            <ul id="listaReservas"></ul>
        </section> 
        <section>
            <div class="modal fade" id="modalEditar" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">                    
                    <div class="modal-header">
                        <h5 class="modal-title">Editar reserva</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="formEditar">
                        <input type="hidden" name="id">
                        <div class="mb-2">
                            <select class="form-select" name="sala">
                            <option value="">Seleccionar sala</option>
                            <option value="SUM Osvaldo Acastello">SUM Osvaldo Acastello</option>
                            <option value="Auditorio">Auditorio</option>
                            <option value="Sala de Comisión Directiva">Sala de Comisión Directiva</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label>Fecha</label>
                            <input type="date" class="form-control" name="fecha">
                        </div>
                        <div class="mb-2">
                            <label>Inicio</label>
                            <input type="time" class="form-control" name="inicio">
                        </div>
                        <div class="mb-2">
                            <label>Fin</label>
                            <input type="time" class="form-control" name="fin">
                        </div>
                        <div class="mb-2">
                            <label>Tema</label>
                            <input type="text" class="form-control" name="tema">
                        </div>
                        <div class="mb-2">
                            <label>Usuario</label>
                            <input type="text" class="form-control" name="usuario">
                        </div>
                        <div class="mb-2">
                            <label>Servicios</label>
                            <div>
                                <input type="checkbox" name="servicios" value="Cafetería"> Cafetería
                            </div>
                            <div>
                                <input type="checkbox" name="servicios" value="Desayuno"> Desayuno
                            </div>
                            <div>
                                <input type="checkbox" name="servicios" value="Merienda"> Merienda
                            </div>
                            <div>
                                <input type="checkbox" name="servicios" value="Almuerzo"> Almuerzo
                            </div>
                            <div>
                                <input type="checkbox" name="servicios" value="Cena"> Cena
                            </div>
                        </div>
                        <div class="mb-2">
                            <label>Comentarios</label>
                            <textarea class="form-control" name="comentarios"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary mt-2">
                            Guardar cambios
                        </button>
                        </form>
                    </div>
                    </div>
                </div>
                </div>
        </section>

    </main>
    <footer>
        <div>
            <small>Copyright © 2025</small>
        </div>   
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="../scripts/app.js"></script>

</body>

</html>
